services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_pm_app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/saas_pm?schema=public
      AUTH_SECRET: change-this-to-a-long-random-string
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0

  db:
    image: postgres:16
    container_name: saas_pm_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saas_pm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_pm"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data: